version: 2

sources:
  - name: heymax
    database: heymax
    schema: raw
    tables:
      - name: events_stream
        description: Cloned Events table listing all the events associated with a user. 
        columns:
          - name: event_time
            data_tests:
              - not_null
          - name: user_id
            data_tests:
              - not_null
        config:
          loaded_at_field: _batched_at
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after:
              count: 24
              period: hour
