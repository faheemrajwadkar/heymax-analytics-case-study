name: Save Production Manifest & Deploy Docs to GH Pages
on:
  push:
    branches: [ "main" ]
  
  workflow_dispatch:

jobs:
  build_docs_and_archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to push to gh-pages branch
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: DuckDB setup - Create heymax.duckdb and ingest data
        run: python ${{ github.workspace }}/scripts/load_data.py

      - name: Generate dbt Docs
        run: |
          cd dbt/heymax/
          dbt deps
          dbt docs generate
          echo "Files generated in target"
          cd ../..
          python ${{ github.workspace }}/scripts/generate_docs.py

      - name: Upload Manifest Artifact (for Slim CI)
        uses: actions/upload-artifact@v4
        with:
          name: dbt-manifest
          path: ./dbt/heymax/target/manifest.json
          retention-days: 14

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dbt/heymax/target
          publish_filename: index.html    # Rename static_index.html > index.html
          force_orphan: true              # Optional: Keep a history of deployments
